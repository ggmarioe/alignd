<div class="flex items-center justify-between gap-3 py-2">
  <div class="flex items-center gap-2 min-w-0">
    <span
      class="truncate text-sm font-medium text-gray-800"
      [attr.aria-label]="participant().name + (participant().isAdmin ? ', admin' : '')"
    >
      {{ participant().name }}
    </span>
    @if (participant().isAdmin) {
      <span class="shrink-0 text-xs font-semibold text-indigo-600" aria-hidden="true">Admin</span>
    }
  </div>

  <div class="flex items-center gap-2 shrink-0">
    <app-vote-badge [value]="participant().voteValue" [state]="badgeState()" />

    @if (showAdminControls()) {
      @if (!votesRevealed()) {
        <app-action-button variant="primary" [disabled]="!canReveal()" (click)="revealVotes.emit()">
          Reveal votes
        </app-action-button>
      }
      <app-action-button variant="secondary" (click)="changeAdmin.emit()">
        Change admin
      </app-action-button>
    }
  </div>
</div>
